name: CI/CD Pipeline - Meu Dinheiro Real FrontEnd

on:
  push:
    branches: ["main"]
    
jobs: 
    #----1: CI build do Angular---
    build-frontend:        
      runs-on: ubuntu-latest
      steps:
        - name: Checkout do Código
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Escanear por Chaves Expostas (Gitleaks)
          uses: gitleaks/gitleaks-action@v2
          continue-on-error: true
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Configurar Node.js
          uses: actions/setup-node@v4
          with:
            node-version: "24"
            cache: 'npm'
           
        - name: Instalar Dependências
          run: npm ci --legacy-peer-deps
           
        - name: Build de Produção
          run: npm run build -- --configuration=production
          
        - name: Upload do Artefato de Build  
          uses: actions/upload-artifact@v4
          with:
            name: angular-dist-folder
            path: dist/meu-dinheiro-real-frontend/

